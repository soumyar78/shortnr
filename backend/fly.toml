# fly.toml app configuration file generated for shortnr-api on 2026-06-20T23:39:59+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'shortnr-api'
primary_region = 'ewr'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[env]
  HTTP_PORT = "8080"

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512

[deploy]
  release_command = "bundle exec rails db:migrate"
